<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LES ONDES — Newsletter</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .newsletter-page {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px 120px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            filter: url(#roughen);
            font-size: clamp(40px, 5.4vw, 68px);
            font-weight: 400;
            line-height: 1.1;
            letter-spacing: -0.02em;
            text-align: center;
        }

        .newsletter-title {
            color: #000;
        }

        .newsletter-input {
            font-family: 'Diatype', sans-serif;
            font-weight: 400;
            font-size: inherit;
            line-height: inherit;
            letter-spacing: inherit;
            text-align: center;
            color: #000;
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            padding: 0;
        }

        .newsletter-input::placeholder {
            color: #000;
        }

        .newsletter-input:focus::placeholder {
            color: transparent;
        }

        .newsletter-input:focus {
            color: #000;
        }

        .newsletter-error {
            font-size: 16px;
            letter-spacing: 0.08em;
            color: #000;
            min-height: 1.1em;
        }

        .newsletter-submit {
            font-family: 'Diatype', sans-serif;
            font-weight: 400;
            font-size: inherit;
            line-height: inherit;
            letter-spacing: inherit;
            text-align: center;
            color: #000;
            background: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            text-decoration: underline;
            text-underline-offset: 4px;
            padding: 0;
        }

        .newsletter-email {
            position: fixed;
            bottom: 78px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 16px;
            line-height: 1.1;
            letter-spacing: 0.08em;
            color: #000;
            text-align: center;
            white-space: nowrap;
        }

        .newsletter-email a {
            color: inherit;
            text-decoration: underline;
            text-underline-offset: 2px;
        }

        @media (max-width: 740px) {
            .newsletter-page {
                font-size: clamp(28px, 9vw, 48px);
                padding: 64px 20px 64px;
            }

            .newsletter-email {
                position: static;
                transform: none;
                margin-top: 40px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <svg style="display:none" aria-hidden="true">
        <defs>
            <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" seed="8" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="1.4" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <header class="site-header">
        <a href="index.html">
            <p id="header-title" data-en="LES ONDES" data-fr="LES ONDES">LES ONDES</p>
            <p id="header-location" data-en="Cerbère" data-fr="Cerbère">Cerbère</p>
            <p id="header-dates" data-en="May 29 30 31" data-fr="29 30 31 Mai">May 29 30 31</p>
        </a>
    </header>

    <iframe name="brevo-target" style="display:none;" aria-hidden="true"></iframe>
    <form id="brevo-form" method="POST"
          action="https://abd5fd25.sibforms.com/serve/MUIFAG8i_gtTVlsPfTO3iFE1Lb00fwt8g9jB8hRS9qx2f9-eH08PvA7aD6JDewUtEGiI0u-ljxed7KLYrRgegt8nb536wy8Cusouw4hEMDcp91HuUtQ4N5l870UhwLJhrp9CzoYoBLgqdL1hhhFBujcqxsVEaamfkd0GMmBtjLeB03GTKTrbErK6p8CHoKUe7PTyj96ex-VftRbYTg=="
          target="brevo-target"
          style="display:none;" aria-hidden="true">
        <input type="text" name="EMAIL" id="brevo-email">
        <input type="text" name="email_address_check" value="">
        <input type="hidden" name="locale" value="en">
        <input type="hidden" name="html_type" value="simple">
    </form>

    <div class="newsletter-page">
        <p class="newsletter-title" data-en="Newsletter" data-fr="Infolettre">Newsletter</p>
        <input class="newsletter-input" type="email" id="newsletter-email-input" placeholder="Enter your email..." data-en-placeholder="Enter your email..." data-fr-placeholder="Entrez votre email...">
        <p class="newsletter-error" id="newsletter-error" aria-live="polite"></p>
        <button class="newsletter-submit" id="newsletter-submit" data-en="Subscribe" data-fr="S'inscrire">Subscribe</button>
    </div>

    <p class="newsletter-email">
        <a href="mailto:poste@les-ondes.fr">poste@les-ondes.fr</a>
    </p>

    <script src="main.js"></script>
</body>
</html>
