<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Les Ondes Cerbère</title>
    <style>
        @font-face {
            font-family: 'Diatype';
            src: url('fonts/ABCDiatype-Heavy-Trial.woff2') format('woff2'),
                 url('fonts/ABCDiatype-Heavy-Trial.woff') format('woff');
            font-weight: 700;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: 'Diatype';
            src: url('fonts/ABCDiatype-Medium-Trial.woff2') format('woff2'),
                 url('fonts/ABCDiatype-Medium-Trial.woff') format('woff');
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Diatype', sans-serif;
            font-weight: 400;
            background: #e8e8e8;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* ── 1080×1350 canvas ── */
        .post {
            width: 1080px;
            height: 1350px;
            background: #fff;
            transform-origin: center center;
            flex-shrink: 0;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            padding: 48px;
            gap: 48px;
        }

        /* ── Two sections: text top, video bottom ── */
        .section-text {
            flex: 1;
            min-height: 0;
            position: relative;
        }

        .section-video {
            flex: 1;
            min-height: 0;
            overflow: hidden;
        }

        /* ── Video fills its section ── */
        .post-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        /* ── Slides: fill the text section, stacked ── */
        .slide {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            filter: url(#roughen);
        }

        /* ── Shared text style ── */
        .slide p {
            font-size: 100px;
            line-height: 1.1;
            letter-spacing: -0.02em;
            color: #000;
            white-space: pre;
            text-align: center;
        }

        /* ── Slide 1: stacked column, centered ── */
        .slide-1 {
            flex-direction: column;
            gap: 48px;
        }

        /* ── Slides 2 & 3: artist names ── */
        .names-grid {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            width: 100%;
        }

        .names-grid p {
            font-size: 52px;
            letter-spacing: 4.16px;
            text-align: center;
            width: 100%;
        }

        /* ── Controls: upper left, fixed ── */
        .controls {
            position: fixed;
            top: clamp(14px, 2vh, 28px);
            left: clamp(14px, 2vw, 28px);
            display: flex;
            gap: 10px;
            z-index: 10;
        }

        .controls button {
            font-family: 'Diatype', sans-serif;
            font-weight: 400;
            font-size: 13px;
            letter-spacing: 0.08em;
            background: none;
            border: 1px solid rgba(0, 0, 0, 0.35);
            padding: 5px 16px;
            cursor: pointer;
            color: black;
            transition: background 0.1s, color 0.1s, border-color 0.1s;
        }

        .controls button:hover {
            background: black;
            color: #fff;
            border-color: black;
        }
    </style>
</head>
<body>
    <svg style="display:none" aria-hidden="true">
        <defs>
            <filter id="roughen" x="-5%" y="-5%" width="110%" height="110%">
                <feTurbulence type="fractalNoise" baseFrequency="0.5" numOctaves="4" seed="8" result="noise"/>
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="2.4" xChannelSelector="R" yChannelSelector="G"/>
            </filter>
        </defs>
    </svg>

    <div class="post" id="post">

        <div class="section-text">
            <!-- Slide 1: LES ONDES / Cerbère / dates -->
            <div class="slide slide-1" id="slide-1">
                <p id="t-title"></p>
                <p id="t-cerbere"></p>
                <p id="dates"></p>
            </div>

            <!-- Slide 2: Miriam → Elisabeth -->
            <div class="slide slide-2" id="slide-2">
                <div class="names-grid">
                    <p id="a1"></p>
                    <p id="a2"></p>
                    <p id="a3"></p>
                    <p id="a4"></p>
                    <p id="a5"></p>
                    <p id="a6"></p>
                </div>
            </div>

            <!-- Slide 3: Louis → Youmna -->
            <div class="slide slide-3" id="slide-3">
                <div class="names-grid">
                    <p id="b1"></p>
                    <p id="b2"></p>
                    <p id="b3"></p>
                    <p id="b4"></p>
                    <p id="b5"></p>
                    <p id="b6"></p>
                </div>
            </div>
        </div>

        <div class="section-video">
            <video class="post-video" autoplay muted loop playsinline>
                <source src="img/BG3_slow.mp4" type="video/mp4">
            </video>
        </div>

    </div>

    <div class="controls">
        <button id="btn-start">start</button>
        <button id="btn-reset">reset</button>
    </div>

    <script>
        // ── Scale post to fit viewport ──────────────────────────────────
        const post = document.getElementById('post');

        function scalePost() {
            const scale = Math.min(
                (window.innerWidth  * 0.9) / 1080,
                (window.innerHeight * 0.9) / 1350
            );
            post.style.transform = `scale(${scale})`;
            document.body.style.height = `${1350 * scale + 80}px`;
        }
        scalePost();
        window.addEventListener('resize', scalePost);

        // ── Slide definitions ───────────────────────────────────────────
        const slides = [
            {
                el: document.getElementById('slide-1'),
                nextOverlap: -600,
                lines: [
                    { id: 't-title',   text: 'LES ONDES',        charDelay: 80,  pauseAfter: 60  },
                    { id: 't-cerbere', text: 'Cerb\u00e8re',     charDelay: 60,  pauseAfter: 60  },
                    { id: 'dates',     text: 'May 29 30 31',     charDelay: 50,  spaceExtra: 60, pauseAfter: 0 },
                ],
            },
            {
                el: document.getElementById('slide-2'),
                nextOverlap: -600,
                lines: [
                    { id: 'a1', text: 'Miriam Adefris',   charDelay: 40, pauseAfter: 80  },
                    { id: 'a2', text: 'Pierre Bastien',   charDelay: 35, pauseAfter: 100 },
                    { id: 'a3', text: 'Lukas de Clerck',  charDelay: 45, pauseAfter: 70  },
                    { id: 'a4', text: 'Maya Dhondt',      charDelay: 32, pauseAfter: 120 },
                    { id: 'a5', text: 'Mats Erlandsson',  charDelay: 42, pauseAfter: 90  },
                    { id: 'a6', text: 'Elisabeth Klinck', charDelay: 45, pauseAfter: 0   },
                ],
            },
            {
                el: document.getElementById('slide-3'),
                nextOverlap: -200,
                lines: [
                    { id: 'b1', text: 'Louis Laurain',           charDelay: 38, pauseAfter: 90  },
                    { id: 'b2', text: 'Lubomyr Melnyk',          charDelay: 32, pauseAfter: 70  },
                    { id: 'b3', text: 'Chantal Michelle',        charDelay: 44, pauseAfter: 100 },
                    { id: 'b4', text: 'Mohammad Reza Mortazavi', charDelay: 30, pauseAfter: 80  },
                    { id: 'b5', text: 'Fredrik Rasten',          charDelay: 50, pauseAfter: 90  },
                    { id: 'b6', text: 'Youmna Saba',             charDelay: 28, pauseAfter: 0   },
                ],
            },
        ];

        // ── Animation engine ────────────────────────────────────────────
        let runId   = 0;
        let running = false;

        function layoutSpaceSet(text) {
            const s = new Set();
            let i;
            i = 0;
            while (i < text.length && text[i] === ' ') s.add(i++);
            i = text.length - 1;
            while (i >= 0 && text[i] === ' ') s.add(i--);
            for (let j = 0; j < text.length; j++) {
                if (text[j] === '\n') {
                    let k = j - 1;
                    while (k >= 0 && text[k] === ' ') s.add(k--);
                    k = j + 1;
                    while (k < text.length && text[k] === ' ') s.add(k++);
                }
            }
            return s;
        }

        function initLineSpans(line) {
            const el = document.getElementById(line.id);
            el.innerHTML = '';
            const layout = layoutSpaceSet(line.text);
            let i = 0;
            for (const ch of line.text) {
                if (ch === '\n') {
                    el.appendChild(document.createElement('br'));
                } else {
                    const sp = document.createElement('span');
                    sp.textContent = ch;
                    sp.style.visibility = layout.has(i) ? 'visible' : 'hidden';
                    el.appendChild(sp);
                }
                i++;
            }
        }

        function clearAll() {
            running = false;
            runId++;
            slides.forEach(s => s.lines.forEach(l => initLineSpans(l)));
            document.getElementById('btn-start').textContent = 'start';
        }

        function at(myRun, ms, fn) {
            setTimeout(() => { if (runId === myRun && running) fn(); }, ms);
        }

        function buildTimeline(slide, vis) {
            const events = [];
            let cursor = 0;

            slide.lines.forEach(line => {
                cursor += (line.startDelay || 0);
                let t = cursor;
                let charIdx = 0;
                const layout = layoutSpaceSet(line.text);
                let i = 0;
                for (const ch of line.text) {
                    if (ch !== '\n') {
                        if (!layout.has(i)) {
                            const idx = charIdx;
                            const id  = line.id;
                            const v   = vis;
                            events.push({ time: t, fn: () => {
                                document.getElementById(id).querySelectorAll('span')[idx].style.visibility = v;
                            }});
                            t += line.charDelay + (ch === ' ' ? (line.spaceExtra || 0) : 0);
                        }
                        charIdx++;
                    }
                    i++;
                }
                cursor = t + line.pauseAfter;
            });

            return { events, duration: cursor };
        }

        function runSlide(myRun, slideIdx) {
            const slide   = slides[slideIdx];
            const nextIdx = (slideIdx + 1) % slides.length;

            slide.lines.forEach(l => initLineSpans(l));

            const { events: typeEvents, duration: typeDuration } = buildTimeline(slide, 'visible');
            typeEvents.forEach(e => at(myRun, e.time, e.fn));

            at(myRun, typeDuration + 300, () => {
                const { events: unEvents, duration: unDuration } = buildTimeline(slide, 'hidden');
                unEvents.forEach(e => at(myRun, e.time, e.fn));

                const overlap = slide.nextOverlap !== undefined ? slide.nextOverlap : -2000;
                at(myRun, unDuration + overlap, () => runSlide(myRun, nextIdx));
            });
        }

        // ── Controls ────────────────────────────────────────────────────
        const btnStart = document.getElementById('btn-start');
        btnStart.addEventListener('click', () => {
            if (running) {
                running = false;
                runId++;
                btnStart.textContent = 'start';
            } else {
                clearAll();
                running = true;
                const myRun = runId;
                btnStart.textContent = 'stop';
                runSlide(myRun, 0);
            }
        });

        document.getElementById('btn-reset').addEventListener('click', clearAll);
    </script>
</body>
</html>
